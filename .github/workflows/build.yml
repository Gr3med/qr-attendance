name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # ✅ تحديث pip (مهم جدًا)
      - name: ⬆️ Upgrade pip
        run: python -m pip install --upgrade pip

      # ✅ تثبيت أدوات البناء (هذا كان ناقص)
      - name: 🛠 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libjpeg-dev zlib1g-dev

      # ✅ تثبيت Flutter
      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"

      # ✅ تثبيت المكتبات
      - name: 📦 Install dependencies
        run: |
          pip install flet
          pip install -r requirements.txt

      # ✅ بناء APK
      - name: 🔨 Build APK
        run: flet build apk

      # ✅ رفع الملف
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qr-attendance-apk
          path: build/apk/*.apk        with:
          name: qr-attendance-apk
          path: build/apk/*.apk
