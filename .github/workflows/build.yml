name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install flet
          pip install -r requirements.txt

      - name: 🔨 Build APK
        run: |
          flet build apk

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qr-attendance-apk
          path: build/apk/*.apk
