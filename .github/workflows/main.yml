name: Build Android APK

on:
  push:
    branches: [ main ] # سيعمل تلقائياً عند الدفع لفرع main
  workflow_dispatch: # يسمح لك بتشغيل البناء يدوياً من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet qrcode pillow

      - name: Build APK with Flet
        run: flet build apk src/main.py --project-name "QRAttendance" --org "com.omarkhalaqi.qr" --app-name "QR Attendance"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: QRAttendance-APK
          path: build/apk/**/*.apk
