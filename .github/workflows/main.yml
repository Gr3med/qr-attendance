name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. إعداد Java (متطلب أساسي لبناء تطبيقات الأندرويد)
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. إعداد Flutter (لكي لا يطلبه Flet أو يتوقف ليسأل عنه)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. إعداد بيئة Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. تثبيت المكتبات
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet qrcode pillow

      # 5. بناء التطبيق (سيعمل الآن بسلاسة دون أي توقف أو أسئلة)
      - name: Build APK with Flet
        run: flet build apk src --project "QRAttendance" --org "com.omarkhalaqi.qr" --product "QR Attendance"

      # 6. رفع ملف الـ APK النهائي
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QRAttendance-APK
          path: build/apk/**/*.apk
