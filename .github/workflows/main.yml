name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # إعداد الجافا
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # إعداد Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # الخطوة الحاسمة: الموافقة التلقائية على تراخيص Android SDK
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      # إعداد بايثون
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet qrcode pillow

      # بناء التطبيق مع تفعيل وضع التفاصيل (--verbose) لمعرفة كل ما يجري
      - name: Build APK with Flet
        run: flet build apk src --project "QRAttendance" --org "com.omarkhalaqi.qr" --product "QR Attendance" --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QRAttendance-APK
          path: '**/*.apk'
